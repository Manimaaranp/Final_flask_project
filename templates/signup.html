{% extends "base.html" %}
{% block content %}

<div class="auth-box">

    <h3>Signup</h3>

    <input id="signupEmail" class="form-control mt-2" placeholder="Email">
    <input id="signupPassword" type="password" class="form-control mt-2" placeholder="Password">

    <button class="btn btn-success mt-3 w-100" onclick="signup()">Create Account</button>

</div>

{% endblock %}
