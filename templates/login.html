{% extends "base.html" %}
{% block content %}

<div class="auth-box">

    <h3>Login</h3>

    <input id="loginEmail" class="form-control mt-2" placeholder="Email">
    <input id="loginPassword" type="password" class="form-control mt-2" placeholder="Password">

    <button class="btn btn-primary mt-3 w-100" onclick="login()">Login</button>

</div>

{% endblock %}
